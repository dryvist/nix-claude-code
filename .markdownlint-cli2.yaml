# Copy of the dryvist/.github canonical .markdownlint-cli2.yaml plus
# repo-specific ignores. Source of truth:
# https://github.com/dryvist/.github/blob/main/.markdownlint-cli2.yaml
# Delta vs canon: adds the `.github/aw/**` ignore for gh-aw artifacts.
# Sync mechanism: manual for now; Renovate custom manager TBD.
#
# Per-file rule overrides are NOT a top-level markdownlint-cli2 schema key
# (verified against schema). For auto-generated files that would trigger
# unavoidable rule violations (e.g., CHANGELOG.md from release-please), we
# add to `ignores` instead. MD024 stays strict-by-default everywhere it
# actually lints — never disabled across the board.

config:
  MD013:
    line_length: 160
    tables: true
    strict: true
    # `heading_line_length` and `code_block_line_length` deliberately not set.
    # An 80-character ceiling is an anti-pattern for modern displays.

# Files to skip entirely. CHANGELOG.md is auto-generated by release-please
# and its commit-link lines + cross-version section headers would force
# unavoidable MD013 and MD024 violations. `.github/aw/**` holds gh-aw
# workflow artifacts that are also generated.
ignores:
  - "CHANGELOG.md"
  - ".github/aw/**"
