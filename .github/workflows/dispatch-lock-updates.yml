# Dispatch: notify consumers after a nix-claude-code release
#
# Target repos are read from the DISPATCH_CONSUMERS repository variable
# (JSON array, e.g. '["nix-ai"]'). Add a new consumer there without
# touching this file.
name: Dispatch lock updates on release

on:
  release:
    types: [published]

permissions: {}

jobs:
  dispatch:
    name: Notify ${{ matrix.repo }}
    strategy:
      matrix:
        repo: ${{ fromJSON(vars.DISPATCH_CONSUMERS) }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          repositories: ${{ matrix.repo }}
          permission-contents: write

      - name: Dispatch update-flake-input
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_REPO: ${{ matrix.repo }}
        run: |
          gh api "repos/dryvist/${TARGET_REPO}/dispatches" \
            -f event_type=update-flake-input \
            -f 'client_payload[input]=nix-claude-code'
