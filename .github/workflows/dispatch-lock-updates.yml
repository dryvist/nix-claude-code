# Dispatch: notify consumers after a nix-claude-code release
#
# Target repos are read from the DISPATCH_CONSUMERS repository variable
# (JSON array, e.g. '["nix-ai"]'). Add a new consumer there without
# touching this file.
name: Dispatch lock updates on release

on:
  release:
    types: [published]

permissions: {}

jobs:
  dispatch:
    uses: dryvist/.github/.github/workflows/_dispatch-flake-consumers.yml@main # zizmor: ignore[secrets-inherit]
    # source_input defaults to the calling repo name (nix-claude-code).
    # Pass the app private key via `secrets: inherit` as the reusable workflow
    # documents; the explicit block form resolved GH_APP_PRIVATE_KEY empty here
    # and the token step failed with "401 - JSON web token could not be decoded"
    # (nix-home uses inherit and dispatches successfully).
    secrets: inherit
