name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  nix-validate:
    name: Nix Validate
    # Shared, FlakeHub-free Nix CI template. Replaces the inline
    # nix-installer-action + magic-nix-cache jobs that failed on api.flakehub.com.
    # `nix flake check` covers flake eval + treefmt + pre-commit + lib tests.
    uses: dryvist/.github/.github/workflows/_nix-validate.yml@main
    with:
      # treefmt/pre-commit checks are platform-specific; restrict to the
      # runner's system (x86_64-linux), matching the previous CI behavior.
      all_systems: false
